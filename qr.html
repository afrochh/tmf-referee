<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TMF Hakem İngilizcesi – QR Kod</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(24,95,165,0.12);
    }
    .logo { color: #185FA5; font-size: 32px; margin-bottom: 8px; }
    h1 { font-size: 18px; font-weight: 700; color: #185FA5; margin-bottom: 4px; }
    .sub { font-size: 13px; color: #888; margin-bottom: 28px; }
    .qr-wrap {
      background: #fff;
      border: 2px solid #e8f0fb;
      border-radius: 16px;
      padding: 20px;
      display: inline-block;
      margin-bottom: 24px;
    }
    .qr-wrap img { width: 200px; height: 200px; display: block; }
    .url {
      font-size: 13px;
      color: #185FA5;
      font-weight: 600;
      background: #e8f0fb;
      padding: 10px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      word-break: break-all;
    }
    .steps { text-align: left; margin-bottom: 24px; }
    .step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 13px;
      color: #444;
    }
    .step-num {
      background: #185FA5;
      color: #fff;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .badge {
      background: #185FA5;
      color: #fff;
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 12px;
      margin-bottom: 20px;
      display: inline-block;
    }
    footer { font-size: 11px; color: #aaa; margin-top: 8px; }

    @media print {
      body { background: #fff; }
      .card { box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🥊</div>
    <h1>TMF Muaythai</h1>
    <div class="sub">Hakem İngilizcesi Eğitim Modülü</div>

    <div class="qr-wrap">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://tmf-muaythai.github.io/tmf-referee/" alt="QR Kod">
    </div>

    <div class="url">tmf-muaythai.github.io/tmf-referee</div>

    <div class="badge">📱 Google Chrome ile aç → Yükle</div>

    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <span>Telefonunuzda Google Chrome'u açın</span>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <span>QR kodu okutun veya linki yazın</span>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <span>"Ana ekrana ekle" bildirimini onaylayın</span>
      </div>
      <div class="step">
        <div class="step-num">4</div>
        <span>Uygulama çevrimdışı da çalışır!</span>
      </div>
    </div>

    <footer>Designed &amp; Developed by <strong>Afra UZ</strong></footer>
  </div>
</body>
</html>
